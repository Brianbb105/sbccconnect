name: Update Course Status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-course-status
  cancel-in-progress: false


jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      PUPPETEER_NO_SANDBOX: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: node app/scripts/extractAllSections.mjs 202730 "Fall 2026"

      - name: Validate sections output
        run: |
          test -f app/data/202730/sections.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('app/data/202730/sections.json','utf8')); if(!Array.isArray(data)) throw new Error('sections.json is not an array'); if(data.length < 500) throw new Error('sections.json has too few rows: ' + data.length); console.log('Validated sections:', data.length);"

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/202730/sections.json
          git diff --cached --quiet || git commit -m "chore: update Fall 2026 course status"

      - name: Push changes
        run: git push
